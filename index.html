<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leitor de Etiquetas WEG</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
    text-align:center;
    margin:20px;
}

video{
    width:100%;
    max-width:500px;
    border-radius:10px;
    border:2px solid #333;
}

canvas{
    display:none;
}

button{
    margin-top:15px;
    padding:15px;
    font-size:18px;
}

input{
    width:90%;
    max-width:500px;
    padding:12px;
    font-size:20px;
    margin:10px;
}

#status{
    margin-top:15px;
    font-weight:bold;
}

</style>

</head>
<body>

<h2>Leitor de Etiqueta</h2>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<br>

<button onclick="capturar()">
Ler Etiqueta
</button>

<br><br>

<label>PEP</label><br>

<input id="pep">

<br>

<label>Diagrama / Ordem</label><br>

<input id="diagrama">

<div id="status"></div>

<script>

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
}
})
.then(stream=>{
video.srcObject=stream;
});

async function capturar(){

status.innerHTML="Capturando...";

const canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

const ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

status.innerHTML="Lendo OCR...";

const resultado=await Tesseract.recognize(
canvas,
'por'
);

const texto=resultado.data.text;

console.log(texto);

extrair(texto);

}

function extrair(texto){

    console.log(texto);

    // Mantém as quebras de linha e remove espaços extras
    texto = texto.replace(/\r/g,"");

//====================
// PEP
//====================

let pep = "";

// Formato normal
let m = texto.match(/\d{3}[-–—]\d{7}[-–—]\d{3}/);

if(m){

    pep = m[0]
        .replace(/–/g,"-")
        .replace(/—/g,"-");

}else{

    // Caso o OCR remova os hífens
    m = texto.match(/\b\d{13}\b/);

    if(m){

        let n = m[0];

        pep = n.substring(0,3) + "-" +
              n.substring(3,10) + "-" +
              n.substring(10,13);

    }

}

document.getElementById("pep").value = pep;

    //====================
    // DIAGRAMA / ORDEM
    //====================

    let linhas = texto.split("\n");

    for(let linha of linhas){

        if(linha.toUpperCase().includes("DIAGR")){

            let numero = linha.match(/\d{9,10}/);

            if(numero){
                document.getElementById("diagrama").value = numero[0];
                break;
            }

        }

    }

    // Caso o OCR tenha separado o número em outra linha
    if(document.getElementById("diagrama").value==""){

        let numeros = texto.match(/\b\d{9,10}\b/g);

        if(numeros){

            for(let n of numeros){

                // ignora CNPJ
                if(n.length==14) continue;

                document.getElementById("diagrama").value=n;
                break;

            }

        }

    }

    status.innerHTML="Leitura concluída.";

}
</script>

</body>
</html>
