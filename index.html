<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Ultra-Rápido de Etiquetas</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --card: #1a1a1a;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 10px;
            text-align: center;
            background: var(--card);
            border-bottom: 1px solid #333;
        }
        #viewport {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Zonas de Detecção */
        .zones-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .zone {
            width: 85%;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .zone-pep { height: 15%; margin-bottom: 10px; border-color: #4cc9f0; }
        .zone-ordem { height: 15%; border-color: #f72585; }
        
        .zone-label {
            position: absolute;
            top: -20px;
            left: 5px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .zone-pep .zone-label { color: #4cc9f0; }
        .zone-ordem .zone-label { color: #f72585; }

        .active-zone { border-color: var(--primary); border-width: 3px; box-shadow: 0 0 15px var(--primary); }

        .controls {
            background: var(--card);
            padding: 15px;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .field {
            margin-bottom: 12px;
        }
        .field label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }
        .field input {
            width: 100%;
            padding: 12px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            box-sizing: border-box;
        }
        #status {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
            height: 15px;
        }
        .btn-clear {
            width: 100%;
            padding: 10px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: var(--primary);">SCANNER DE ALTA PRECISÃO</div>
</div>

<div id="viewport">
    <video id="video" autoplay playsinline></video>
    <div class="zones-overlay">
        <div class="zone zone-pep" id="box-pep">
            <span class="zone-label">POSICIONE O PEP AQUI</span>
        </div>
        <div class="zone zone-ordem" id="box-ordem">
            <span class="zone-label">POSICIONE A ORDEM AQUI</span>
        </div>
    </div>
</div>

<div class="controls">
    <div id="status">Iniciando sistema...</div>
    
    <div class="field">
        <label>PEP DETECTADO</label>
        <input type="text" id="pep" readonly placeholder="...">
    </div>
    
    <div class="field">
        <label>ORDEM / DIAGRAMA DETECTADO</label>
        <input type="text" id="ordem" readonly placeholder="...">
    </div>

    <button class="btn-clear" onclick="reset()">LIMPAR SCANNER</button>
</div>

<canvas id="canvas-pep"></canvas>
<canvas id="canvas-ordem"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const pepIn = document.getElementById('pep');
    const ordemIn = document.getElementById('ordem');
    const boxPep = document.getElementById('box-pep');
    const boxOrdem = document.getElementById('box-ordem');

    let worker = null;
    let isBusy = false;

    async function init() {
        try {
            status.innerText = "Configurando Câmera...";
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: 1280, height: 720 }
            });
            video.srcObject = stream;

            status.innerText = "Carregando Inteligência...";
            worker = await Tesseract.createWorker('por');
            // Otimização: Apenas números e caracteres específicos para ser mais rápido
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789-./ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            });

            status.innerText = "Scanner Ativo";
            scanLoop();
        } catch (e) {
            status.innerText = "Erro ao iniciar: " + e.message;
        }
    }

    function processImage(ctx, w, h) {
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const v = (data[i] + data[i+1] + data[i+2]) / 3;
            const res = v < 110 ? 0 : 255; // Threshold agressivo para letras falhadas
            data[i] = data[i+1] = data[i+2] = res;
        }
        ctx.putImageData(imgData, 0, 0);
    }

    async function scanLoop() {
        if (isBusy) {
            setTimeout(scanLoop, 100);
            return;
        }

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            isBusy = true;
            
            const vW = video.videoWidth;
            const vH = video.videoHeight;

            // Captura Zona PEP
            if (!pepIn.value) {
                await captureAndRead('pep', vW, vH, 0.35, 0.15); // Posição superior
            }

            // Captura Zona Ordem
            if (!ordemIn.value) {
                await captureAndRead('ordem', vW, vH, 0.55, 0.15); // Posição inferior
            }

            isBusy = false;
        }
        setTimeout(scanLoop, 200); // Frequência de scan alta
    }

    async function captureAndRead(type, vW, vH, yFactor, hFactor) {
        const canvas = document.getElementById(`canvas-${type}`);
        const box = document.getElementById(`box-${type === 'pep' ? 'pep' : 'ordem'}`);
        
        const sW = vW * 0.85;
        const sH = vH * hFactor;
        const sX = (vW - sW) / 2;
        const sY = vH * yFactor;

        canvas.width = sW;
        canvas.height = sH;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, sX, sY, sW, sH, 0, 0, sW, sH);
        processImage(ctx, sW, sH);

        try {
            const { data: { text } } = await worker.recognize(canvas);
            const clean = text.replace(/\s/g, '').toUpperCase();
            
            if (type === 'pep') {
                // Regex PEP: Deve ter o formato com hifens (ex: 170-2500343-121)
                const match = clean.match(/\d{3}-\d{7}-\d{3}/);
                if (match) {
                    pepIn.value = match[0];
                    box.classList.add('active-zone');
                }
            } else {
                // Regex Ordem: 9 dígitos exatos
                const match = clean.match(/\b\d{9}\b/);
                if (match) {
                    ordemIn.value = match[0];
                    box.classList.add('active-zone');
                }
            }
        } catch (e) {}
    }

    function reset() {
        pepIn.value = "";
        ordemIn.value = "";
        boxPep.classList.remove('active-zone');
        boxOrdem.classList.remove('active-zone');
        status.innerText = "Scanner Reiniciado";
    }

    window.onload = init;
</script>

</body>
</html>
