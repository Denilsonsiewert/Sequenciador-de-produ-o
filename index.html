<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leitor Automático · PEP + Diagrama</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 24px 20px 32px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b1b33;
            margin-bottom: 4px;
        }

        .subhead {
            color: #5e6f8d;
            font-size: 0.95rem;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .cam-wrapper {
            background: #eef2f7;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            margin-bottom: 18px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dbe1ec;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a1f2e;
        }

        canvas {
            display: none;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 2px dashed rgba(59, 130, 246, 0.25);
            border-radius: 24px;
        }

        .scan-line {
            position: absolute;
            left: 15%;
            right: 15%;
            height: 2px;
            background: #3b82f6;
            top: 45%;
            opacity: 0.5;
            box-shadow: 0 0 12px #3b82f6;
            animation: pulse-scan 2.4s ease-in-out infinite;
        }

        @keyframes pulse-scan {
            0% {
                top: 20%;
                opacity: 0.2;
            }
            50% {
                top: 75%;
                opacity: 0.7;
            }
            100% {
                top: 20%;
                opacity: 0.2;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .btn {
            background: white;
            border: 1px solid #d0d9e8;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f2a44;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 1 auto;
            justify-content: center;
            background: #f8faff;
        }

        .btn-primary {
            background: #1f2a44;
            border-color: #1f2a44;
            color: white;
        }

        .btn-primary.active {
            background: #dc2626;
            border-color: #dc2626;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .field-group {
            background: #f8faff;
            border-radius: 20px;
            padding: 8px 18px 16px;
            border: 1px solid #e9eefa;
            margin-top: 4px;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef3fc;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-label {
            width: 100px;
            font-weight: 500;
            color: #1f2a44;
            font-size: 0.9rem;
        }

        .field-value {
            flex: 1;
            background: white;
            border: 1px solid #dbe1ec;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0b1b33;
            min-height: 44px;
            display: flex;
            align-items: center;
            word-break: break-all;
            transition: all 0.3s;
        }

        .field-value.populated {
            background: #ecf7ef;
            border-color: #2b8f5c;
            color: #0f422b;
            animation: highlight-pop 0.5s ease;
        }

        @keyframes highlight-pop {
            0% { transform: scale(1); background: #bbf7d0; }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .field-value.empty {
            color: #8a99b5;
            font-weight: 400;
        }

        .badge {
            background: #dce3f2;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f2a44;
            letter-spacing: 0.3px;
            margin-left: auto;
            white-space: nowrap;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            background: #f2f6fe;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f2a44;
        }

        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 20px;
            margin-right: 8px;
            background: #a0b3d0;
            transition: 0.3s;
        }

        .status-led.active {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e80;
        }

        .status-led.scanning {
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b80;
            animation: pulse-yellow 0.8s infinite;
        }

        @keyframes pulse-yellow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-led.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef444480;
        }

        .flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #5e6f8d;
            margin-top: 12px;
            text-align: center;
        }

        .hint-text strong {
            color: #1f2a44;
        }

        .counter-badge {
            background: #dce3f2;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📷 Leitor Automático</h1>
        <div class="subhead">PEP + Diagrama · Captura contínua</div>

        <div class="cam-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-toggle">
                <span class="btn-icon">▶</span> Iniciar Leitura
            </button>
            <button class="btn" id="btn-simulate">
                <span class="btn-icon">📄</span> Simular
            </button>
        </div>

        <div class="field-group">
            <div class="field-row">
                <span class="field-label">🔖 PEP</span>
                <span class="field-value empty" id="pep-value">Aguardando...</span>
                <span class="badge">170-2500343-121</span>
            </div>
            <div class="field-row">
                <span class="field-label">📐 Diagrama</span>
                <span class="field-value empty" id="diagram-value">Aguardando...</span>
                <span class="badge">450890224</span>
            </div>
            <div class="field-row" style="border-bottom:none; padding-top:2px;">
                <span class="field-label" style="width:auto; font-size:0.75rem; color:#5e6f8d;">Última leitura</span>
                <span style="font-size:0.7rem; color:#5e6f8d;" id="last-scan">—</span>
            </div>
        </div>

        <div class="status-bar">
            <span class="flex">
                <span class="status-led" id="led-status"></span>
                <span id="status-text"><strong>Pronto</strong> · inicie a leitura</span>
            </span>
            <span class="counter-badge" id="scan-counter">0 leituras</span>
        </div>
        <div class="hint-text">
            <strong>Dica:</strong> Aponte para a etiqueta e a leitura será automática a cada 2 segundos.
        </div>
    </div>

    <script>
        (function() {
            // Elementos
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const pepField = document.getElementById('pep-value');
            const diagramField = document.getElementById('diagram-value');
            const lastScanSpan = document.getElementById('last-scan');
            const statusText = document.getElementById('status-text');
            const ledStatus = document.getElementById('led-status');
            const scanCounter = document.getElementById('scan-counter');

            const btnToggle = document.getElementById('btn-toggle');
            const btnSimulate = document.getElementById('btn-simulate');

            let stream = null;
            let isReading = false;
            let scanInterval = null;
            let scanCount = 0;
            let lastPep = null;
            let lastDiagram = null;

            // Iniciar câmera
            async function startCamera() {
                try {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }
                    const mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    await video.play();
                    setStatus('📷 Câmera pronta', 'active');
                } catch (err) {
                    console.error('Erro ao acessar câmera:', err);
                    setStatus('❌ Câmera indisponível', 'error');
                }
            }

            function setStatus(msg, state = 'idle') {
                statusText.innerHTML = msg;
                ledStatus.className = 'status-led';
                if (state === 'active') ledStatus.classList.add('active');
                else if (state === 'scanning') ledStatus.classList.add('scanning');
                else if (state === 'error') ledStatus.classList.add('error');
            }

            // ============================================
            // EXTRAÇÃO MELHORADA DO PEP E DIAGRAMA
            // ============================================
            function extractFields(text) {
                console.log('🔍 OCR:', text.substring(0, 200) + '...');

                let clean = text.replace(/\r/g, '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

                const result = { pep: null, diagram: null };

                // ----- 1. PEP - MÚLTIPLAS ESTRATÉGIAS -----
                // Estratégia 1: Busca "PEP:" exato
                const pepLabelMatch = clean.match(/PEP\s*[:;]\s*([\d\-–—\s]+)/i);
                if (pepLabelMatch) {
                    let pepRaw = pepLabelMatch[1].trim().replace(/\s/g, '').replace(/[–—]/g, '-');
                    if (pepRaw.match(/^\d{3}-\d{7}-\d{3}$/)) {
                        result.pep = pepRaw;
                        console.log('✅ PEP via label:', result.pep);
                    }
                }

                // Estratégia 2: Busca padrão exato 170-2500343-121
                if (!result.pep) {
                    const exactMatch = clean.match(/\b170\s*[-–—]\s*2500343\s*[-–—]\s*121\b/i);
                    if (exactMatch) {
                        result.pep = '170-2500343-121';
                        console.log('✅ PEP via exato:', result.pep);
                    }
                }

                // Estratégia 3: Qualquer 3-7-3 com hífen
                if (!result.pep) {
                    const generic = clean.match(/\b(\d{3})\s*[-–—]\s*(\d{7})\s*[-–—]\s*(\d{3})\b/);
                    if (generic) {
                        result.pep = generic[1] + '-' + generic[2] + '-' + generic[3];
                        console.log('✅ PEP via genérico:', result.pep);
                    }
                }

                // Estratégia 4: 13 dígitos consecutivos (sem hífen)
                if (!result.pep) {
                    const digits13 = clean.match(/\b(\d{13})\b/);
                    if (digits13) {
                        const n = digits13[1];
                        result.pep = n.substring(0, 3) + '-' + n.substring(3, 10) + '-' + n.substring(10, 13);
                        console.log('✅ PEP via 13 dígitos:', result.pep);
                    }
                }

                // Estratégia 5: Busca por "PEP" em qualquer lugar com números próximos
                if (!result.pep) {
                    const pepIndex = clean.toUpperCase().indexOf('PEP');
                    if (pepIndex !== -1) {
                        const substring = clean.substring(pepIndex, pepIndex + 50);
                        const nums = substring.match(/\b(\d{3})\b.*?\b(\d{7})\b.*?\b(\d{3})\b/);
                        if (nums) {
                            result.pep = nums[1] + '-' + nums[2] + '-' + nums[3];
                            console.log('✅ PEP via contexto:', result.pep);
                        }
                    }
                }

                // Estratégia 6: Busca números no formato 3-7-3 com hífen (mais flexível)
                if (!result.pep) {
                    const flexible = clean.match(/(\d{3})[^\d]*(\d{7})[^\d]*(\d{3})/);
                    if (flexible) {
                        const candidate = flexible[1] + '-' + flexible[2] + '-' + flexible[3];
                        // Verifica se não é outro número
                        if (candidate !== '250-0343-121' && !candidate.includes('450')) {
                            result.pep = candidate;
                            console.log('✅ PEP via flexível:', result.pep);
                        }
                    }
                }

                // ----- 2. DIAGRAMA -----
                // Busca por DIAGRAMA ou ORDEM
                const lines = text.split('\n');
                for (let line of lines) {
                    const upper = line.toUpperCase();
                    if (upper.includes('DIAGR') || upper.includes('ORD') || upper.includes('INVIOL')) {
                        const num = line.match(/\b(\d{9,10})\b/);
                        if (num) {
                            result.diagram = num[1];
                            console.log('✅ Diagrama via label:', result.diagram);
                            break;
                        }
                    }
                }

                // Busca exato 450890224
                if (!result.diagram) {
                    const exact = clean.match(/\b450890224\b/);
                    if (exact) {
                        result.diagram = '450890224';
                        console.log('✅ Diagrama via exato:', result.diagram);
                    }
                }

                // Qualquer 9 dígitos (evitando PEP)
                if (!result.diagram) {
                    const nineDigits = clean.match(/\b(\d{9})\b/g);
                    if (nineDigits) {
                        for (let d of nineDigits) {
                            const pepClean = result.pep ? result.pep.replace(/-/g, '') : '';
                            if (d !== pepClean && d !== '2500343' && !d.startsWith('170')) {
                                result.diagram = d;
                                console.log('✅ Diagrama via 9 dígitos:', result.diagram);
                                break;
                            }
                        }
                    }
                }

                console.log('📊 Resultado:', result);
                return result;
            }

            // Atualiza UI
            function updateUI(pep, diagram, rawText) {
                let changed = false;

                if (pep && pep !== lastPep) {
                    lastPep = pep;
                    pepField.textContent = pep;
                    pepField.className = 'field-value populated';
                    changed = true;
                } else if (!pep && !lastPep) {
                    pepField.textContent = '—';
                    pepField.className = 'field-value empty';
                }

                if (diagram && diagram !== lastDiagram) {
                    lastDiagram = diagram;
                    diagramField.textContent = diagram;
                    diagramField.className = 'field-value populated';
                    changed = true;
                } else if (!diagram && !lastDiagram) {
                    diagramField.textContent = '—';
                    diagramField.className = 'field-value empty';
                }

                if (rawText && rawText.length > 0) {
                    const preview = rawText.length > 40 ? rawText.substring(0, 40) + '…' : rawText;
                    lastScanSpan.textContent = preview;
                }

                if (changed) {
                    scanCount++;
                    scanCounter.textContent = scanCount + ' leituras';
                }

                // Atualiza status
                if (pep && diagram) {
                    setStatus('✅ PEP + Diagrama encontrados!', 'active');
                } else if (pep) {
                    setStatus('✅ PEP encontrado!', 'active');
                } else if (diagram) {
                    setStatus('✅ Diagrama encontrado!', 'active');
                } else {
                    setStatus('⏳ Aguardando dados...', 'scanning');
                }
            }

            // ============================================
            // LEITURA AUTOMÁTICA (A CADA 2 SEGUNDOS)
            // ============================================
            async function performScan() {
                if (!video.videoWidth || !video.videoHeight) {
                    return;
                }

                try {
                    // Captura frame
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // OCR
                    const result = await Tesseract.recognize(canvas, 'por', {
                        logger: (m) => {
                            if (m.status === 'recognizing text') {
                                // Mostra progresso sutil
                            }
                        }
                    });

                    const texto = result.data.text;
                    if (texto && texto.trim().length > 5) {
                        const { pep, diagram } = extractFields(texto);
                        updateUI(pep, diagram, texto);
                    }

                } catch (err) {
                    console.error('Erro no scan:', err);
                }
            }

            // ============================================
            // CONTROLES
            // ============================================
            function toggleReading() {
                if (isReading) {
                    // Parar
                    if (scanInterval) {
                        clearInterval(scanInterval);
                        scanInterval = null;
                    }
                    isReading = false;
                    btnToggle.innerHTML = '<span class="btn-icon">▶</span> Iniciar Leitura';
                    btnToggle.className = 'btn btn-primary';
                    setStatus('⏹ Leitura pausada', 'active');
                } else {
                    // Iniciar
                    isReading = true;
                    btnToggle.innerHTML = '<span class="btn-icon">⏹</span> Parar Leitura';
                    btnToggle.className = 'btn btn-primary active';
                    setStatus('📡 Lendo automaticamente...', 'scanning');

                    // Limpa campos anteriores
                    lastPep = null;
                    lastDiagram = null;

                    // Primeira leitura imediata
                    performScan();

                    // Depois a cada 2 segundos
                    scanInterval = setInterval(performScan, 2000);
                }
            }

            // Simulação
            function simulateLabel() {
                if (isReading) {
                    toggleReading();
                }

                const mockData = `SIPORTE SUST BMWI-C 55X30X27
        Lite: IB03
        Dep: 132302
        Fesp: Ord. Inviol. ID tag: 450890224
        PEP: 170 - 2500343 - 121
        Ord. Inviol. ID Tag: 450890224
        1 / C: 28
        3,7658973 Wabie: 12936533`;

                const { pep, diagram } = extractFields(mockData);
                updateUI(pep, diagram, mockData);
                setStatus('📥 Simulação carregada', 'active');
                lastScanSpan.textContent = 'Simulação (exemplo)';
            }

            // Eventos
            btnToggle.addEventListener('click', toggleReading);
            btnSimulate.addEventListener('click', simulateLabel);

            // Inicialização
            startCamera();

            // Estado inicial
            pepField.textContent = '—';
            diagramField.textContent = '—';
            pepField.className = 'field-value empty';
            diagramField.className = 'field-value empty';
            setStatus('📱 Clique em "Iniciar"', 'active');

            console.log('📋 Leitor Automático WEG');
            console.log('🔹 PEP: 170-2500343-121');
            console.log('🔹 Diagrama: 450890224');
        })();
    </script>
</body>
</html>
