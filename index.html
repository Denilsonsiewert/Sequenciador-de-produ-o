<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEG - Câmera OCR Otimizada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Usando versão mais recente e leve do Tesseract se possível, ou mantendo a estável -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --weg-blue: #005BAC;
            --weg-dark: #003D79;
            --weg-light: #E8F1FB;
            --bg: #F4F6F9;
            --card: #FFFFFF;
            --border: #D9E2EC;
            --success: #00A651;
            --danger: #D32F2F;
            --text: #2C3E50;
            --text-light: #7B8A9A;
            --shadow: 0 2px 8px rgba(0,0,0,.08);
            --radius: 12px;
            --transition: all .25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; min-height: 100vh; }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
        }

        .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { font-size: 18px; color: var(--weg-blue); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: 600; transition: var(--transition); min-height: 44px;
        }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .camera-container {
            position: relative; width: 100%; border-radius: 12px; overflow: hidden;
            background: #000; aspect-ratio: 4/3; display: none; margin-bottom: 15px;
            border: 2px solid var(--border);
        }
        .camera-container.active { display: block; }
        .camera-container video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .camera-container canvas { display: none; }

        /* Guia visual para o usuário centralizar a etiqueta */
        .camera-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        .scan-region {
            width: 80%; height: 40%; border: 2px dashed rgba(255,255,255,0.5);
            border-radius: 8px; position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.3);
        }
        .scan-line {
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: var(--success); animation: scan 2s linear infinite;
            box-shadow: 0 0 10px var(--success);
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .camera-status {
            text-align: center; padding: 12px; margin-bottom: 15px; border-radius: 8px;
            font-size: 13px; font-weight: 600; min-height: 45px;
        }
        .camera-status.scanning { background: var(--weg-light); color: var(--weg-blue); }
        .camera-status.success { background: rgba(0,166,81,.1); color: var(--success); }
        .camera-status.error { background: rgba(211,47,47,.1); color: var(--danger); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text-light); }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 16px; color: var(--text); background: #f9f9f9;
        }
        .form-group input:focus { border-color: var(--weg-blue); outline: none; background: white; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: white; padding: 12px 20px; border-radius: 8px;
            box-shadow: var(--shadow-lg); margin-bottom: 10px; border-left: 4px solid var(--weg-blue);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="card-head">
        <h2><i class="fa-solid fa-bolt"></i> OCR Ultra Rápido</h2>
        <button id="btnToggle" class="btn btn-success" onclick="Admin.toggleCamera()">
            <i class="fa-solid fa-video"></i> Iniciar
        </button>
    </div>

    <div id="cameraSection" class="camera-container">
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="cameraCanvas"></canvas>
        <div class="camera-overlay">
            <div class="scan-region">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div id="cameraStatus" class="camera-status" style="display:none;"></div>

    <div class="form-group">
        <label>PEP (Detectado Automaticamente)</label>
        <input type="text" id="cad-pep" readonly placeholder="Aproxime a etiqueta...">
    </div>
    <div class="form-group">
        <label>Diagrama / Ordem</label>
        <input type="text" id="cad-diagrama" readonly placeholder="...">
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script>
    const State = {
        cameraStream: null,
        worker: null,
        isScanning: false,
        lastResult: null,
        scanTimeout: null
    };

    const UI = {
        showToast(type, title, msg) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'success' ? 'var(--success)' : (type === 'error' ? 'var(--danger)' : 'var(--weg-blue)');
            toast.innerHTML = `<strong>${title}</strong><br>${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    };

    const Admin = {
        async initWorker() {
            if (!State.worker) {
                console.log("Inicializando Worker Tesseract...");
                State.worker = await Tesseract.createWorker('por', 1, {
                    logger: m => {} // Silenciar logs para performance
                });
                // Otimização: Configurar para procurar apenas caracteres relevantes se necessário
                // await State.worker.setParameters({
                //     tessedit_char_whitelist: '0123456789-ABCDEFGHIJKLMNOPQRSTUVWXYZ ',
                // });
            }
        },

        async toggleCamera() {
            const btn = document.getElementById('btnToggle');
            if (State.cameraStream) {
                this.fecharCamera();
                btn.innerHTML = '<i class="fa-solid fa-video"></i> Iniciar';
                btn.className = 'btn btn-success';
            } else {
                await this.abrirCamera();
                btn.innerHTML = '<i class="fa-solid fa-stop"></i> Parar';
                btn.className = 'btn btn-danger';
            }
        },

        async abrirCamera() {
            const cameraSection = document.getElementById('cameraSection');
            const cameraStatus = document.getElementById('cameraStatus');
            
            cameraSection.classList.add('active');
            cameraStatus.style.display = 'block';
            cameraStatus.className = 'camera-status scanning';
            cameraStatus.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Preparando motor OCR...';

            try {
                // Inicializa o worker em paralelo
                const workerPromise = this.initWorker();

                const video = document.getElementById('cameraVideo');
                State.cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 },
                        focusMode: 'continuous'
                    }
                });
                video.srcObject = State.cameraStream;
                await video.play();

                await workerPromise;
                
                cameraStatus.innerHTML = '<strong>SISTEMA PRONTO</strong><br>Posicione o PEP dentro do quadro';
                State.isScanning = true;
                this.loop();

            } catch (err) {
                console.error(err);
                cameraStatus.className = 'camera-status error';
                cameraStatus.innerHTML = 'Erro ao acessar câmera.';
            }
        },

        async loop() {
            if (!State.isScanning) return;
            
            const startTime = Date.now();
            await this.performScan();
            
            // Ajuste dinâmico do intervalo: se o processamento for rápido, espera menos.
            const processTime = Date.now() - startTime;
            const delay = Math.max(100, 500 - processTime); 
            
            State.scanTimeout = setTimeout(() => this.loop(), delay);
        },

        async performScan() {
            const video = document.getElementById('cameraVideo');
            const canvas = document.getElementById('cameraCanvas');
            const ctx = canvas.getContext('2d');

            if (!video.videoWidth || !video.videoHeight) return;

            // OTIMIZAÇÃO 1: Crop da área de interesse (ROI)
            // Pegamos apenas o centro da imagem onde está o guia visual
            const sw = video.videoWidth * 0.8;
            const sh = video.videoHeight * 0.4;
            const sx = (video.videoWidth - sw) / 2;
            const sy = (video.videoHeight - sh) / 2;

            canvas.width = sw;
            canvas.height = sh;

            // OTIMIZAÇÃO 2: Pré-processamento de Imagem (Grayscale e Contraste)
            ctx.filter = 'grayscale(1) contrast(1.2) brightness(1.1)';
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

            try {
                // OTIMIZAÇÃO 3: Uso de Worker persistente (não recria a cada scan)
                const { data: { text } } = await State.worker.recognize(canvas);
                this.processText(text);
            } catch (err) {
                console.error("Erro OCR:", err);
            }
        },

        processText(texto) {
            if (!texto) return;
            
            // OTIMIZAÇÃO 4: Regex mais agressiva e limpeza de ruído
            let clean = texto.replace(/[^a-zA-Z0-9\-\s]/g, ' ').replace(/\s+/g, ' ');
            
            // Busca PEP: Padrão 000-0000000-000
            const pepMatch = clean.match(/\b(\d{3})\s*[-]?\s*(\d{7})\s*[-]?\s*(\d{3})\b/);
            if (pepMatch) {
                const pep = `${pepMatch[1]}-${pepMatch[2]}-${pepMatch[3]}`;
                if (pep !== State.lastResult) {
                    document.getElementById('cad-pep').value = pep;
                    State.lastResult = pep;
                    UI.showToast('success', 'PEP Detectado!', pep);
                    
                    // Tenta achar o diagrama próximo
                    const diagMatch = clean.match(/\b(\d{8,10})\b/);
                    if (diagMatch && diagMatch[0] !== pepMatch[1] && diagMatch[0] !== pepMatch[2]) {
                        document.getElementById('cad-diagrama').value = diagMatch[0];
                    }
                }
            }
        },

        fecharCamera() {
            State.isScanning = false;
            if (State.scanTimeout) clearTimeout(State.scanTimeout);
            if (State.cameraStream) {
                State.cameraStream.getTracks().forEach(track => track.stop());
                State.cameraStream = null;
            }
            document.getElementById('cameraSection').classList.remove('active');
            document.getElementById('cameraStatus').style.display = 'none';
        }
    };
</script>

</body>
</html>
