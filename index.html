<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Automático de Etiquetas</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            background-color: #121212;
            color: white;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin: 10px 0;
            color: #4cc9f0;
        }
        #video-container {
            position: relative;
            width: 100%;
            flex: 1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .guide-box {
            width: 80%;
            height: 40%;
            border: 2px dashed #4cc9f0;
            border-radius: 8px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #4cc9f0;
            box-shadow: 0 0 10px #4cc9f0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .results {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px 12px 0 0;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 10px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 10px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 1.1rem;
            font-family: monospace;
        }
        input:focus {
            border-color: #4cc9f0;
            outline: none;
        }
        #status-bar {
            padding: 8px;
            font-size: 0.8rem;
            text-align: center;
            background: #333;
            width: 100%;
            box-sizing: border-box;
        }
        .flash-success {
            animation: flash 0.5s;
        }
        @keyframes flash {
            0% { background: #1e1e1e; }
            50% { background: #2e7d32; }
            100% { background: #1e1e1e; }
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Scanner Inteligente</h1>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay">
            <div class="guide-box">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div id="status-bar">Iniciando câmera...</div>

    <div class="results" id="results-panel">
        <div class="form-group">
            <label>PEP (Automático)</label>
            <input type="text" id="pep" readonly placeholder="Aguardando detecção...">
        </div>
        <div class="form-group">
            <label>DIAGRAMA / ORDEM (Automático)</label>
            <input type="text" id="diagrama" readonly placeholder="Aguardando detecção...">
        </div>
        <button onclick="clearFields()" style="width:100%; padding:8px; background:#444; color:white; border:none; border-radius:4px; font-size:0.8rem;">Limpar Campos</button>
    </div>
</div>

<canvas id="canvas"></canvas>
<canvas id="preprocess-canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preCanvas = document.getElementById('preprocess-canvas');
    const statusBar = document.getElementById('status-bar');
    const pepInput = document.getElementById('pep');
    const diagramaInput = document.getElementById('diagrama');
    const resultsPanel = document.getElementById('results-panel');

    let isProcessing = false;
    let worker = null;

    async function initOCR() {
        statusBar.innerText = "Carregando motor de OCR...";
        worker = await Tesseract.createWorker('por', 1, {
            logger: m => {
                if(m.status === 'recognizing') {
                    statusBar.innerText = `Escaneando: ${Math.round(m.progress * 100)}%`;
                }
            }
        });
        statusBar.innerText = "Pronto para escanear.";
        startScanningLoop();
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            video.srcObject = stream;
            initOCR();
        } catch (err) {
            statusBar.innerText = "Erro: Sem acesso à câmera.";
        }
    }

    function preprocessImage(ctx, width, height) {
        const imageData = ctx.getImageData(0, 0, width, height);
        const data = imageData.data;
        
        // Converter para escala de cinza e aumentar contraste
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            // Filtro de Limiar (Threshold) simples para lidar com impressão falhada
            // Se for muito claro, vira branco. Se for escuro, vira preto.
            const threshold = 120; 
            const val = avg > threshold ? 255 : 0;
            data[i] = data[i+1] = data[i+2] = val;
        }
        ctx.putImageData(imageData, 0, 0);
    }

    async function startScanningLoop() {
        if (isProcessing) return;
        
        const loop = async () => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                isProcessing = true;
                
                // Capturar apenas a área central (guide-box)
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                
                // Definir área de corte (baseado na guide-box de 80% largura e 40% altura)
                const sW = vW * 0.8;
                const sH = vH * 0.4;
                const sX = (vW - sW) / 2;
                const sY = (vH - sH) / 2;

                canvas.width = sW;
                canvas.height = sH;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, sX, sY, sW, sH, 0, 0, sW, sH);
                
                // Aplicar pré-processamento para melhorar leitura de impressão ruim
                preprocessImage(ctx, sW, sH);

                try {
                    const { data: { text } } = await worker.recognize(canvas);
                    processExtractedText(text);
                } catch (e) {
                    console.error(e);
                }
                
                isProcessing = false;
            }
            // Aguarda um pouco antes da próxima tentativa para não travar o dispositivo
            setTimeout(loop, 500); 
        };
        loop();
    }

    function processExtractedText(text) {
        // Limpeza básica para lidar com falhas de OCR (ex: trocar 'O' por '0', 'I' por '1')
        const cleanText = text.toUpperCase()
            .replace(/[OI]/g, (m) => m === 'O' ? '0' : '1')
            .replace(/[^A-Z0-9-\s\.\/:]/g, '');

        console.log("OCR bruto:", text);
        console.log("OCR limpo:", cleanText);

        // Regex flexível para PEP: busca algo como XXX-XXXXXXX-XXX
        // Aceita variações de separadores causadas por falha de impressão
        const pepRegex = /(\d{3})[-.\s]?(\d{7})[-.\s]?(\d{3})/;
        const pepMatch = cleanText.match(pepRegex);
        
        // Regex para Diagrama/Ordem: 9 dígitos
        const diagRegex = /\b(\d{9})\b/;
        const diagMatch = cleanText.match(diagRegex);

        let found = false;

        if (pepMatch && !pepInput.value) {
            const formattedPep = `${pepMatch[1]}-${pepMatch[2]}-${pepMatch[3]}`;
            pepInput.value = formattedPep;
            found = true;
        }

        if (diagMatch && !diagramaInput.value) {
            diagramaInput.value = diagMatch[1];
            found = true;
        }

        if (found) {
            resultsPanel.classList.add('flash-success');
            setTimeout(() => resultsPanel.classList.remove('flash-success'), 500);
            statusBar.innerText = "Dados capturados!";
        }
    }

    function clearFields() {
        pepInput.value = "";
        diagramaInput.value = "";
        statusBar.innerText = "Campos limpos. Aguardando nova etiqueta...";
    }

    window.onload = startCamera;
</script>

</body>
</html>
