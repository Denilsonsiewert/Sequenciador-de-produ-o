<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#30363d;
  --accent:#00b4d8;--accent2:#0077b6;--success:#3fb950;--warn:#d29922;--danger:#f85149;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --radius:12px;--font:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono','Fira Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.app{width:100%;max-width:480px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.title{font-size:1.15rem;font-weight:600;letter-spacing:-0.3px}
.subtitle{font-size:0.75rem;color:var(--text2);margin-top:2px}
.cam-wrap{position:relative;background:#000;border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;border:1px solid var(--surface3)}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas{display:none}
.overlay{position:absolute;inset:0;pointer-events:none}
.corner{position:absolute;width:22px;height:22px;border-color:var(--accent);border-style:solid;opacity:.8}
.corner-tl{top:12px;left:12px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.corner-tr{top:12px;right:12px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.corner-bl{bottom:12px;left:12px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.corner-br{bottom:12px;right:12px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}
.scan-beam{position:absolute;left:10%;right:10%;height:1.5px;background:var(--accent);top:50%;box-shadow:0 0 10px var(--accent);opacity:0;transition:opacity .3s}
.scan-beam.active{opacity:.7;animation:beam 1.8s ease-in-out infinite}
@keyframes beam{0%{top:15%}50%{top:82%}100%{top:15%}}
.cam-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);border-radius:20px;padding:3px 10px;font-size:.65rem;font-weight:600;letter-spacing:.5px;color:var(--accent);border:1px solid rgba(0,180,216,.25)}
.cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3)}
.cam-placeholder svg{opacity:.3}
.cam-placeholder p{font-size:.8rem}
.progress-wrap{height:2px;background:var(--surface3);border-radius:2px;margin:10px 0;overflow:hidden}
.progress-bar{height:100%;width:0%;background:var(--accent);transition:width .2s;border-radius:2px}
.controls{display:flex;gap:8px;margin-bottom:16px}
.btn{flex:1;border:1px solid var(--surface3);background:var(--surface2);color:var(--text);border-radius:10px;padding:11px 16px;font-family:var(--font);font-size:.85rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent2);border-color:var(--accent);color:#fff}
.btn-primary.stop{background:#2a1515;border-color:var(--danger);color:var(--danger)}
.btn svg{flex-shrink:0}
.fields{background:var(--surface);border-radius:var(--radius);border:1px solid var(--surface3);overflow:hidden;margin-bottom:14px}
.field{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--surface3)}
.field:last-child{border-bottom:none}
.field-icon{width:32px;height:32px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;color:var(--text2)}
.field-meta{flex:1;min-width:0}
.field-label{font-size:.65rem;color:var(--text2);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.field-val{font-family:var(--mono);font-size:.95rem;font-weight:500;color:var(--text3);transition:.3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.field-val.found{color:var(--success);animation:pop .4s ease}
@keyframes pop{0%{transform:scale(1.04);opacity:.6}100%{transform:scale(1);opacity:1}}
.field-copy{background:none;border:1px solid var(--surface3);border-radius:6px;padding:4px 9px;font-size:.7rem;color:var(--text2);cursor:pointer;font-family:var(--font);transition:.15s;flex-shrink:0}
.field-copy:hover{border-color:var(--accent);color:var(--accent)}
.field-copy.ok{border-color:var(--success);color:var(--success)}
.statusbar{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:10px;border:1px solid var(--surface3);padding:10px 14px;font-size:.8rem;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:.3s}
.dot.ready{background:var(--success);box-shadow:0 0 6px var(--success)}
.dot.scan{background:var(--warn);box-shadow:0 0 6px var(--warn);animation:blink .7s infinite}
.dot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{flex:1}
.count-badge{background:var(--surface2);border-radius:20px;padding:2px 10px;font-size:.7rem;font-weight:600;color:var(--text2)}
.hint{font-size:.7rem;color:var(--text3);text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">📷</div>
    <div>
      <div class="title">Leitor de Etiqueta</div>
      <div class="subtitle">OCR automático · PEP + Diagrama</div>
    </div>
  </div>

  <div class="cam-wrap" style="margin-bottom:10px">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="overlay">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-beam" id="beam"></div>
    </div>
    <div class="cam-badge" id="cam-badge">PARADO</div>
    <div class="cam-placeholder" id="cam-ph">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <p>Câmera não iniciada</p>
    </div>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="prog"></div></div>

  <div class="controls">
    <button class="btn btn-primary" id="btn-toggle">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Iniciar
    </button>
    <button class="btn" id="btn-sim">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Simular
    </button>
    <button class="btn" id="btn-clear">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.78"/></svg>
      Limpar
    </button>
  </div>

  <div class="fields">
    <div class="field">
      <div class="field-icon">PEP</div>
      <div class="field-meta">
        <div class="field-label">Número PEP</div>
        <div class="field-val" id="pep-val">—</div>
      </div>
      <button class="field-copy" id="pep-copy" onclick="copyField('pep')">Copiar</button>
    </div>
    <div class="field">
      <div class="field-icon" style="font-size:.6rem">DIAG</div>
      <div class="field-meta">
        <div class="field-label">Diagrama / Ordem</div>
        <div class="field-val" id="diag-val">—</div>
      </div>
      <button class="field-copy" id="diag-copy" onclick="copyField('diag')">Copiar</button>
    </div>
  </div>

  <div class="statusbar">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status-txt">Pronto — clique em Iniciar</span>
    <span class="count-badge" id="cnt">0 scans</span>
  </div>
  <div class="hint">Aponte para a etiqueta · leitura a cada 2 s</div>
</div>

<script>
(function(){
  const video=document.getElementById('video'),
        canvas=document.getElementById('canvas'),
        ctx=canvas.getContext('2d'),
        pepVal=document.getElementById('pep-val'),
        diagVal=document.getElementById('diag-val'),
        statusTxt=document.getElementById('status-txt'),
        dot=document.getElementById('dot'),
        prog=document.getElementById('prog'),
        beam=document.getElementById('beam'),
        camBadge=document.getElementById('cam-badge'),
        camPh=document.getElementById('cam-ph'),
        cntBadge=document.getElementById('cnt'),
        btnToggle=document.getElementById('btn-toggle'),
        btnSim=document.getElementById('btn-sim'),
        btnClear=document.getElementById('btn-clear');

  let stream=null, isOn=false, timer=null, scanCnt=0;
  let lastPep=null, lastDiag=null;
  let worker=null, workerReady=false;

  // ── PRÉ-CARREGA TESSERACT ──────────────────────────────────────
  async function initWorker(){
    try{
      worker = await Tesseract.createWorker('por', 1, {
        logger: m => {
          if(m.status==='recognizing text'){
            prog.style.width = (m.progress*100)+'%';
          }
        }
      });
      await worker.setParameters({
        tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK,
        tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz:.-/ ',
      });
      workerReady=true;
      setStatus('Pronto — clique em Iniciar','ready');
    } catch(e){
      setStatus('Erro ao carregar OCR','err');
    }
  }

  // ── MELHORA CONTRASTE PARA OCR ────────────────────────────────
  function preprocessCanvas(){
    const idata=ctx.getImageData(0,0,canvas.width,canvas.height);
    const d=idata.data;
    for(let i=0;i<d.length;i+=4){
      // grayscale
      const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      // threshold adaptivo simples
      const val=gray>128?255:0;
      d[i]=d[i+1]=d[i+2]=val;
    }
    ctx.putImageData(idata,0,0);
  }

  // ── CÂMERA ────────────────────────────────────────────────────
  async function startCamera(){
    try{
      if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
      stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1280},height:{ideal:960}}
      });
      video.srcObject=stream;
      await video.play();
      camPh.style.display='none';
    } catch(e){
      setStatus('Câmera indisponível','err');
    }
  }

  // ── EXTRAÇÃO ──────────────────────────────────────────────────
  function extract(text){
    const clean=text.replace(/\r/g,'').replace(/\n/g,' ').replace(/\s+/g,' ');
    let pep=null,diag=null;

    // PEP: padrão 3-7-3
    const m1=clean.match(/PEP\s*[:;=]?\s*([\d]{3}[\s\-–]*[\d]{7}[\s\-–]*[\d]{3})/i);
    if(m1){ pep=m1[1].replace(/[\s\-–]+/g,'').replace(/(\d{3})(\d{7})(\d{3})/,'$1-$2-$3'); }

    if(!pep){
      const m2=clean.match(/\b(\d{3})[\s\-–]+(\d{7})[\s\-–]+(\d{3})\b/);
      if(m2) pep=m2[1]+'-'+m2[2]+'-'+m2[3];
    }
    if(!pep){
      const m3=clean.match(/\b(\d{13})\b/);
      if(m3){ const n=m3[1]; pep=n.slice(0,3)+'-'+n.slice(3,10)+'-'+n.slice(10); }
    }

    // DIAGRAMA: 9 dígitos em contexto
    const lines=text.split(/\n/);
    for(const ln of lines){
      if(/diagr|ordem|inviol|ord\./i.test(ln)){
        const mn=ln.match(/\b(\d{8,10})\b/);
        if(mn){diag=mn[1];break;}
      }
    }
    if(!diag){
      const all9=clean.match(/\b(\d{9})\b/g);
      if(all9){
        const pepDigits=pep?pep.replace(/-/g,''):'';
        for(const d of all9){
          if(d!==pepDigits && !pepDigits.includes(d)){diag=d;break;}
        }
      }
    }

    return{pep,diag};
  }

  // ── SCAN ─────────────────────────────────────────────────────
  async function doScan(){
    if(!video.videoWidth) return;
    if(!workerReady){setStatus('OCR carregando...','scan');return;}

    setStatus('Lendo etiqueta...','scan');
    try{
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      ctx.drawImage(video,0,0);
      preprocessCanvas();

      const r=await worker.recognize(canvas);
      const txt=r.data.text;
      prog.style.width='100%';
      setTimeout(()=>prog.style.width='0%',400);

      if(txt && txt.trim().length>3){
        const {pep,diag}=extract(txt);
        updateFields(pep,diag);
      }
    } catch(e){
      console.error(e);
    }
  }

  function updateFields(pep,diag){
    let changed=false;
    if(pep && pep!==lastPep){
      lastPep=pep; pepVal.textContent=pep;
      pepVal.className='field-val found'; changed=true;
    }
    if(diag && diag!==lastDiag){
      lastDiag=diag; diagVal.textContent=diag;
      diagVal.className='field-val found'; changed=true;
    }
    if(changed){ scanCnt++; cntBadge.textContent=scanCnt+' scans'; }

    if(lastPep&&lastDiag) setStatus('PEP + Diagrama capturados ✓','ready');
    else if(lastPep) setStatus('PEP capturado — buscando diagrama...','scan');
    else if(lastDiag) setStatus('Diagrama capturado — buscando PEP...','scan');
    else setStatus('Nenhum dado detectado','scan');
  }

  // ── TOGGLE ───────────────────────────────────────────────────
  function toggle(){
    if(isOn){
      clearInterval(timer);timer=null;isOn=false;
      btnToggle.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Iniciar';
      btnToggle.className='btn btn-primary';
      beam.classList.remove('active');
      camBadge.textContent='PARADO';camBadge.style.color='';
      setStatus('Leitura pausada','ready');
    } else {
      startCamera().then(()=>{
        isOn=true;lastPep=null;lastDiag=null;
        btnToggle.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Parar';
        btnToggle.className='btn btn-primary stop';
        beam.classList.add('active');
        camBadge.textContent='LENDO';camBadge.style.color='var(--success)';
        setStatus('Lendo automaticamente...','scan');
        doScan();
        timer=setInterval(doScan,2500);
      });
    }
  }

  // ── SIMULAR ──────────────────────────────────────────────────
  function simulate(){
    if(isOn) toggle();
    const mock=`SIPORTE SUST BMWI-C 55X30X27
Lite: IB03  Dep: 132302
Fesp: Ord. Inviol. ID tag: 450890224
PEP: 170 - 2500343 - 121
Ord. Inviol. ID Tag: 450890224
1 / C: 28   3,7658973`;
    const {pep,diag}=extract(mock);
    updateFields(pep,diag);
    setStatus('Simulação carregada ✓','ready');
  }

  // ── LIMPAR ───────────────────────────────────────────────────
  function clearFields(){
    lastPep=null;lastDiag=null;
    pepVal.textContent='—';pepVal.className='field-val';
    diagVal.textContent='—';diagVal.className='field-val';
    setStatus('Campos limpos','ready');
  }

  // ── STATUS ────────────────────────────────────────────────────
  function setStatus(msg,state){
    statusTxt.textContent=msg;
    dot.className='dot';
    if(state==='ready') dot.classList.add('ready');
    else if(state==='scan') dot.classList.add('scan');
    else if(state==='err') dot.classList.add('err');
  }

  // ── COPIAR ────────────────────────────────────────────────────
  window.copyField=function(field){
    const val=field==='pep'?lastPep:lastDiag;
    const btn=document.getElementById(field+'-copy');
    if(!val) return;
    navigator.clipboard.writeText(val).then(()=>{
      btn.textContent='Copiado!';btn.classList.add('ok');
      setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('ok');},1500);
    });
  };

  btnToggle.addEventListener('click',toggle);
  btnSim.addEventListener('click',simulate);
  btnClear.addEventListener('click',clearFields);

  setStatus('Carregando OCR...','scan');
  initWorker();
})();
</script>
</body>
</html>
