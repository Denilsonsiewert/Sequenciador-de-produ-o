<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leitor de Etiquetas · PEP + Diagrama</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 24px 20px 32px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b1b33;
            margin-bottom: 4px;
        }

        .subhead {
            color: #5e6f8d;
            font-size: 0.95rem;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .cam-wrapper {
            background: #eef2f7;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            margin-bottom: 18px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dbe1ec;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a1f2e;
        }

        canvas {
            display: none;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 2px dashed rgba(59, 130, 246, 0.25);
            border-radius: 24px;
        }

        .scan-line {
            position: absolute;
            left: 15%;
            right: 15%;
            height: 2px;
            background: #3b82f6;
            top: 45%;
            opacity: 0.5;
            box-shadow: 0 0 12px #3b82f6;
            animation: pulse-scan 2.4s ease-in-out infinite;
        }

        @keyframes pulse-scan {
            0% {
                top: 20%;
                opacity: 0.2;
            }
            50% {
                top: 75%;
                opacity: 0.7;
            }
            100% {
                top: 20%;
                opacity: 0.2;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .btn {
            background: white;
            border: 1px solid #d0d9e8;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f2a44;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 1 auto;
            justify-content: center;
            background: #f8faff;
        }

        .btn-primary {
            background: #1f2a44;
            border-color: #1f2a44;
            color: white;
        }

        .btn-primary:active {
            background: #0f172a;
        }
        .btn:active {
            background: #e9eef6;
        }

        .btn-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .field-group {
            background: #f8faff;
            border-radius: 20px;
            padding: 8px 18px 16px;
            border: 1px solid #e9eefa;
            margin-top: 4px;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef3fc;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-label {
            width: 100px;
            font-weight: 500;
            color: #1f2a44;
            font-size: 0.9rem;
        }

        .field-value {
            flex: 1;
            background: white;
            border: 1px solid #dbe1ec;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0b1b33;
            min-height: 44px;
            display: flex;
            align-items: center;
            word-break: break-all;
        }

        .field-value.populated {
            background: #ecf7ef;
            border-color: #2b8f5c;
            color: #0f422b;
        }

        .field-value.empty {
            color: #8a99b5;
            font-weight: 400;
        }

        .badge {
            background: #dce3f2;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f2a44;
            letter-spacing: 0.3px;
            margin-left: auto;
            white-space: nowrap;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            background: #f2f6fe;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f2a44;
        }

        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 20px;
            margin-right: 8px;
            background: #a0b3d0;
        }

        .status-led.active {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e80;
        }

        .status-led.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef444480;
        }

        .flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #5e6f8d;
            margin-top: 12px;
            text-align: center;
        }

        .hint-text strong {
            color: #1f2a44;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📋 Leitor WEG</h1>
        <div class="subhead">PEP + Diagrama · Aponte e clique em "Ler"</div>

        <div class="cam-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="btn-capture">
                <span class="btn-icon">📸</span> Ler Etiqueta
            </button>
            <button class="btn" id="btn-simulate">
                <span class="btn-icon">📄</span> Simular
            </button>
        </div>

        <div class="field-group">
            <div class="field-row">
                <span class="field-label">🔖 PEP</span>
                <span class="field-value empty" id="pep-value">Aguardando...</span>
                <span class="badge">170-2500343-121</span>
            </div>
            <div class="field-row">
                <span class="field-label">📐 Diagrama</span>
                <span class="field-value empty" id="diagram-value">Aguardando...</span>
                <span class="badge">450890224</span>
            </div>
            <div class="field-row" style="border-bottom:none; padding-top:2px;">
                <span class="field-label" style="width:auto; font-size:0.75rem; color:#5e6f8d;">Última leitura</span>
                <span style="font-size:0.7rem; color:#5e6f8d;" id="last-scan">—</span>
            </div>
        </div>

        <div class="status-bar">
            <span class="flex">
                <span class="status-led" id="led-status"></span>
                <span id="status-text"><strong>Pronto</strong> · clique em "Ler"</span>
            </span>
            <span id="timer-badge" style="font-size:0.7rem;color:#5e6f8d;">OCR</span>
        </div>
        <div class="hint-text">
            <strong>Dica:</strong> Posicione a etiqueta e clique em "Ler Etiqueta" para capturar PEP e Diagrama.
        </div>
    </div>

    <script>
        (function() {
            // Elementos
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const pepField = document.getElementById('pep-value');
            const diagramField = document.getElementById('diagram-value');
            const lastScanSpan = document.getElementById('last-scan');
            const statusText = document.getElementById('status-text');
            const ledStatus = document.getElementById('led-status');
            const timerBadge = document.getElementById('timer-badge');

            const btnCapture = document.getElementById('btn-capture');
            const btnSimulate = document.getElementById('btn-simulate');

            let stream = null;
            let isProcessing = false;

            // Iniciar câmera
            async function startCamera() {
                try {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }
                    const mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    await video.play();
                    setStatus('📷 Câmera ativa', 'active');
                } catch (err) {
                    console.error('Erro ao acessar câmera:', err);
                    setStatus('❌ Câmera indisponível', 'error');
                }
            }

            function setStatus(msg, state = 'idle') {
                statusText.innerHTML = msg;
                ledStatus.className = 'status-led';
                if (state === 'active') ledStatus.classList.add('active');
                else if (state === 'error') ledStatus.classList.add('error');
            }

            // ============================================
            // FUNÇÃO CORRIGIDA PARA EXTRAIR PEP E DIAGRAMA
            // ============================================
            function extractFields(text) {
                console.log('🔍 Texto OCR completo:', text);

                // Limpa e normaliza o texto
                let clean = text.replace(/\r/g, '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

                const result = { pep: null, diagram: null };

                // ----- 1. EXTRAIR PEP (MUITO MAIS ROBUSTO) -----
                // Busca por "PEP:" seguido do número
                const pepWithLabel = clean.match(/PEP\s*[:;]\s*([\d\-–—\s]+)/i);
                if (pepWithLabel) {
                    let pepRaw = pepWithLabel[1].trim();
                    // Remove espaços e normaliza traços
                    pepRaw = pepRaw.replace(/\s/g, '').replace(/[–—]/g, '-');
                    // Verifica se está no formato correto (3-7-3)
                    const pepMatch = pepRaw.match(/^(\d{3})-(\d{7})-(\d{3})$/);
                    if (pepMatch) {
                        result.pep = pepMatch[0];
                        console.log('✅ PEP encontrado via label:', result.pep);
                    }
                }

                // Se não encontrou com label, busca padrão 170-2500343-121
                if (!result.pep) {
                    const pepRegex = /\b(170\s*[-–—]\s*2500343\s*[-–—]\s*121)\b/i;
                    const match = clean.match(pepRegex);
                    if (match) {
                        result.pep = match[1].replace(/\s/g, '').replace(/[–—]/g, '-');
                        console.log('✅ PEP encontrado via padrão:', result.pep);
                    }
                }

                // Terceira tentativa: qualquer 3-7-3 com hífen
                if (!result.pep) {
                    const genericPep = clean.match(/\b(\d{3})\s*[-–—]\s*(\d{7})\s*[-–—]\s*(\d{3})\b/);
                    if (genericPep) {
                        result.pep = genericPep[1] + '-' + genericPep[2] + '-' + genericPep[3];
                        console.log('✅ PEP encontrado via genérico:', result.pep);
                    }
                }

                // Quarta tentativa: 13 dígitos consecutivos
                if (!result.pep) {
                    const digits13 = clean.match(/\b(\d{13})\b/);
                    if (digits13) {
                        const n = digits13[1];
                        result.pep = n.substring(0, 3) + '-' + n.substring(3, 10) + '-' + n.substring(10, 13);
                        console.log('✅ PEP encontrado via 13 dígitos:', result.pep);
                    }
                }

                // Última tentativa: busca qualquer padrão que pareça PEP (3-7-3 mesmo com erros)
                if (!result.pep) {
                    // Busca números separados por espaços ou hífens
                    const parts = clean.match(/\b(\d{3})\s*[-–—\s]\s*(\d{7})\s*[-–—\s]\s*(\d{3})\b/);
                    if (parts) {
                        result.pep = parts[1] + '-' + parts[2] + '-' + parts[3];
                        console.log('✅ PEP encontrado via partes:', result.pep);
                    }
                }

                // ----- 2. EXTRAIR DIAGRAMA -----
                // Busca por "DIAGRAMA" ou "DIAGR" seguido de número
                const diagramLines = text.split('\n');
                for (let line of diagramLines) {
                    if (line.toUpperCase().includes('DIAGR') || line.toUpperCase().includes('ORD')) {
                        const num = line.match(/\b(\d{9,10})\b/);
                        if (num) {
                            result.diagram = num[1];
                            console.log('✅ Diagrama encontrado via label:', result.diagram);
                            break;
                        }
                    }
                }

                // Se não encontrou via label, busca 450890224 específico
                if (!result.diagram) {
                    const exactMatch = clean.match(/\b450890224\b/);
                    if (exactMatch) {
                        result.diagram = '450890224';
                        console.log('✅ Diagrama encontrado via exato:', result.diagram);
                    }
                }

                // Fallback: qualquer número de 9 dígitos
                if (!result.diagram) {
                    const nineDigits = clean.match(/\b(\d{9})\b/g);
                    if (nineDigits) {
                        for (let d of nineDigits) {
                            // Evita pegar o PEP
                            const pepClean = result.pep ? result.pep.replace(/-/g, '') : '';
                            if (d !== pepClean && d !== '2500343' && !d.startsWith('170')) {
                                result.diagram = d;
                                console.log('✅ Diagrama encontrado via 9 dígitos:', result.diagram);
                                break;
                            }
                        }
                    }
                }

                // Se ainda não tem diagrama, tenta 10 dígitos
                if (!result.diagram) {
                    const tenDigits = clean.match(/\b(\d{10})\b/);
                    if (tenDigits) {
                        result.diagram = tenDigits[1];
                        console.log('✅ Diagrama encontrado via 10 dígitos:', result.diagram);
                    }
                }

                console.log('📊 Resultado final:', result);
                return result;
            }

            // Atualiza UI
            function updateUI(pep, diagram, rawText) {
                if (pep) {
                    pepField.textContent = pep;
                    pepField.className = 'field-value populated';
                } else {
                    pepField.textContent = 'não encontrado';
                    pepField.className = 'field-value empty';
                }

                if (diagram) {
                    diagramField.textContent = diagram;
                    diagramField.className = 'field-value populated';
                } else {
                    diagramField.textContent = 'não encontrado';
                    diagramField.className = 'field-value empty';
                }

                if (rawText && rawText.length > 0) {
                    const preview = rawText.length > 45 ? rawText.substring(0, 45) + '…' : rawText;
                    lastScanSpan.textContent = preview;
                } else {
                    lastScanSpan.textContent = '—';
                }
            }

            // Captura e processa
            async function captureAndRead() {
                if (isProcessing) {
                    setStatus('⏳ Processando...', 'active');
                    return;
                }

                if (!video.videoWidth || !video.videoHeight) {
                    setStatus('⚠️ Aguarde a câmera iniciar', 'error');
                    return;
                }

                isProcessing = true;
                setStatus('📸 Capturando...', 'active');
                timerBadge.textContent = 'OCR ⏳';

                try {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    setStatus('🔍 Lendo OCR...', 'active');

                    const result = await Tesseract.recognize(canvas, 'por', {
                        logger: (m) => {
                            if (m.status === 'recognizing text') {
                                timerBadge.textContent = `OCR ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    });

                    const texto = result.data.text;
                    console.log('📄 OCR completo');

                    const { pep, diagram } = extractFields(texto);
                    updateUI(pep, diagram, texto);

                    // Mostra status baseado no que foi encontrado
                    if (pep && diagram) {
                        setStatus('✅ PEP e Diagrama encontrados!', 'active');
                    } else if (pep) {
                        setStatus('⚠️ PEP encontrado, Diagrama não localizado', 'active');
                    } else if (diagram) {
                        setStatus('⚠️ Diagrama encontrado, PEP não localizado', 'active');
                    } else {
                        setStatus('❌ Nenhum campo encontrado', 'error');
                    }

                    timerBadge.textContent = 'OK ✓';

                } catch (err) {
                    console.error('Erro no OCR:', err);
                    setStatus('❌ Erro na leitura', 'error');
                    timerBadge.textContent = 'Erro';
                } finally {
                    isProcessing = false;
                    setTimeout(() => {
                        if (!isProcessing) timerBadge.textContent = 'OCR';
                    }, 3000);
                }
            }

            // Simulação
            function simulateLabel() {
                if (isProcessing) return;

                const mockData = `SIPORTE SUST BMWI-C 55X30X27
        Lite: IB03
        Dep: 132302
        Fesp: Ord. Inviol. ID tag: 450890224
        PEP: 170 - 2500343 - 121
        Ord. Inviol. ID Tag: 450890224
        1 / C: 28
        3,7658973 Wabie: 12936533`;

                const { pep, diagram } = extractFields(mockData);
                updateUI(pep, diagram, mockData);
                setStatus('📥 Simulação carregada', 'active');
                lastScanSpan.textContent = 'Simulação (exemplo)';
                timerBadge.textContent = 'SIM';
                setTimeout(() => { timerBadge.textContent = 'OCR'; }, 2500);
            }

            // Eventos
            btnCapture.addEventListener('click', captureAndRead);
            btnSimulate.addEventListener('click', simulateLabel);

            // Inicialização
            startCamera();

            pepField.textContent = '—';
            diagramField.textContent = '—';
            pepField.className = 'field-value empty';
            diagramField.className = 'field-value empty';
            setStatus('📱 Câmera pronta', 'active');

            console.log('📋 Leitor WEG · PEP + Diagrama (CORRIGIDO)');
        })();
    </script>
</body>
</html>
