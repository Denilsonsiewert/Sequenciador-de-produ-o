<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Industrial - Leitura Vertical</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --main: #2196F3; --bg: #121212; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        #video-wrap { position: relative; flex: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .focus-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .box { width: 280px; height: 280px; border: 2px solid var(--main); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); position: relative; }
        .box::after { content: "CENTRALIZE O PEP OU ORDEM"; position: absolute; top: -30px; width: 100%; text-align: center; color: var(--main); font-size: 12px; font-weight: bold; }
        
        .data-panel { background: #1e1e1e; padding: 20px; border-radius: 20px 20px 0 0; pointer-events: auto; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; }
        input { width: 100%; background: #2d2d2d; border: 1px solid #444; padding: 12px; border-radius: 8px; color: #00E676; font-size: 1.2rem; font-weight: bold; box-sizing: border-box; }
        
        #status { font-size: 10px; text-align: center; margin-bottom: 10px; color: var(--main); height: 12px; }
        .flash-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; padding: 15px; border-radius: 50%; pointer-events: auto; color: white; font-size: 20px; }
        
        canvas { display: none; }
    </style>
</head>
<body>

<div id="video-wrap">
    <video id="video" autoplay playsinline></video>
    <div class="ui-overlay">
        <button class="flash-btn" id="torch">🔦</button>
        <div class="focus-area">
            <div class="box"></div>
        </div>
        <div class="data-panel">
            <div id="status">Iniciando motor de leitura...</div>
            <div class="input-group">
                <label>PEP (AUTOMÁTICO)</label>
                <input type="text" id="pep" readonly placeholder="---">
            </div>
            <div class="input-group">
                <label>DIAGRAMA / ORDEM (AUTOMÁTICO)</label>
                <input type="text" id="ordem" readonly placeholder="---">
            </div>
            <button onclick="reset()" style="width:100%; padding:12px; background:#333; border:none; color:white; border-radius:8px; font-weight:bold;">LIMPAR CAMPOS</button>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const pepIn = document.getElementById('pep');
    const ordemIn = document.getElementById('ordem');
    let worker;
    let isProcessing = false;
    let torchOn = false;

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;

            worker = await Tesseract.createWorker('por');
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789-./',
                tessedit_pageseg_mode: '1', // Detecção automática de orientação
            });

            status.innerText = "Scanner Pronto - Suporta leitura vertical";
            loop();
        } catch (e) {
            status.innerText = "Erro: " + e.message;
        }
    }

    async function loop() {
        if (isProcessing) {
            setTimeout(loop, 100);
            return;
        }

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            isProcessing = true;
            await processFrame();
            isProcessing = false;
        }
        setTimeout(loop, 300);
    }

    async function processFrame() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Capturar área central
        const size = Math.min(video.videoWidth, video.videoHeight) * 0.7;
        const x = (video.videoWidth - size) / 2;
        const y = (video.videoHeight - size) / 2;
        
        canvas.width = size;
        canvas.height = size;
        ctx.drawImage(video, x, y, size, size, 0, 0, size, size);

        // APLICAR FILTROS DE NITIDEZ E CONTRASTE (Crucial para impressão falhada)
        const imgData = ctx.getImageData(0, 0, size, size);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const avg = (data[i] + data[i+1] + data[i+2]) / 3;
            // Filtro de limiar dinâmico
            const val = avg < 130 ? 0 : 255; 
            data[i] = data[i+1] = data[i+2] = val;
        }
        ctx.putImageData(imgData, 0, 0);

        try {
            // Tentar ler na orientação normal
            let result = await worker.recognize(canvas);
            parse(result.data.text);

            // Se não encontrou PEP ou Ordem, rotacionar o canvas em 90 graus e tentar novamente
            if (!pepIn.value || !ordemIn.value) {
                const rotCanvas = document.createElement('canvas');
                rotCanvas.width = size;
                rotCanvas.height = size;
                const rotCtx = rotCanvas.getContext('2d');
                rotCtx.translate(size/2, size/2);
                rotCtx.rotate(Math.PI / 2);
                rotCtx.drawImage(canvas, -size/2, -size/2);
                
                result = await worker.recognize(rotCanvas);
                parse(result.data.text);
            }
        } catch (e) {}
    }

    function parse(text) {
        const clean = text.replace(/\s/g, '').toUpperCase();
        
        // PEP: XXX-XXXXXXX-XXX (Permite pequenas falhas no separador)
        const pepMatch = clean.match(/(\d{3})[-.\s/]?(\d{7})[-.\s/]?(\d{3})/);
        if (pepMatch && !pepIn.value) {
            pepIn.value = `${pepMatch[1]}-${pepMatch[2]}-${pepMatch[3]}`;
            vibrate();
        }

        // Ordem: 9 dígitos exatos
        const ordemMatch = clean.match(/\b\d{9}\b/);
        if (ordemMatch && !ordemIn.value) {
            ordemIn.value = ordemMatch[0];
            vibrate();
        }
    }

    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(100);
    }

    function reset() {
        pepIn.value = "";
        ordemIn.value = "";
        status.innerText = "Scanner Reiniciado";
    }

    document.getElementById('torch').onclick = async () => {
        const track = video.srcObject.getVideoTracks()[0];
        if (track.getCapabilities().torch) {
            torchOn = !torchOn;
            await track.applyConstraints({ advanced: [{ torch: torchOn }] });
        }
    };

    window.onload = init;
</script>

</body>
</html>
