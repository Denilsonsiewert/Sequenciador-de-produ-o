<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leitor de Etiquetas WEG · PEP + Diagrama</title>
    <!-- Tesseract.js para OCR (leitura de texto da imagem) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            margin: 0;
        }

        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            padding: 24px 20px 32px;
            transition: all 0.2s;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0b1b33;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .subhead {
            color: #5e6f8d;
            font-size: 0.95rem;
            border-left: 4px solid #3b82f6;
            padding-left: 12px;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .cam-wrapper {
            background: #eef2f7;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            margin-bottom: 18px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #dbe1ec;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #1a1f2e;
        }

        canvas {
            display: none;
        }

        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 2px dashed rgba(59, 130, 246, 0.25);
            border-radius: 24px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.03);
        }

        .scan-line {
            position: absolute;
            left: 15%;
            right: 15%;
            height: 2px;
            background: #3b82f6;
            top: 45%;
            opacity: 0.5;
            box-shadow: 0 0 12px #3b82f6;
            animation: pulse-scan 2.4s ease-in-out infinite;
        }

        @keyframes pulse-scan {
            0% {
                top: 20%;
                opacity: 0.2;
            }
            50% {
                top: 75%;
                opacity: 0.7;
            }
            100% {
                top: 20%;
                opacity: 0.2;
            }
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .btn {
            background: white;
            border: 1px solid #d0d9e8;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1f2a44;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 1 auto;
            justify-content: center;
            background: #f8faff;
        }

        .btn-primary {
            background: #1f2a44;
            border-color: #1f2a44;
            color: white;
        }

        .btn-primary:active {
            background: #0f172a;
        }
        .btn:active {
            background: #e9eef6;
        }

        .btn-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .field-group {
            background: #f8faff;
            border-radius: 20px;
            padding: 8px 18px 16px;
            border: 1px solid #e9eefa;
            margin-top: 4px;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef3fc;
        }

        .field-row:last-child {
            border-bottom: none;
        }

        .field-label {
            width: 100px;
            font-weight: 500;
            color: #1f2a44;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
        }

        .field-value {
            flex: 1;
            background: white;
            border: 1px solid #dbe1ec;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0b1b33;
            min-height: 44px;
            display: flex;
            align-items: center;
            word-break: break-all;
            transition: 0.1s;
        }

        .field-value.populated {
            background: #ecf7ef;
            border-color: #2b8f5c;
            color: #0f422b;
        }

        .field-value.empty {
            color: #8a99b5;
            font-weight: 400;
        }

        .badge {
            background: #dce3f2;
            border-radius: 40px;
            padding: 2px 12px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1f2a44;
            letter-spacing: 0.3px;
            margin-left: auto;
            white-space: nowrap;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            background: #f2f6fe;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f2a44;
        }

        .status-led {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 20px;
            margin-right: 8px;
            background: #a0b3d0;
            transition: 0.2s;
        }

        .status-led.active {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e80;
        }

        .status-led.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef444480;
        }

        .flex {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hint-text {
            font-size: 0.75rem;
            color: #5e6f8d;
            margin-top: 12px;
            text-align: center;
        }

        .hint-text strong {
            color: #1f2a44;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>📋 Leitor</span>
            <span style="font-size:0.7rem;background:#eef3fc;padding:2px 14px;border-radius:40px;font-weight:400;">PEP + Diagrama</span>
        </h1>
        <div class="subhead">Aponte para a etiqueta e clique em "Ler Etiqueta"</div>

        <!-- CÂMERA + OVERLAY -->
        <div class="cam-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="scan-overlay"></div>
            <div class="scan-line"></div>
        </div>

        <!-- CONTROLES -->
        <div class="controls">
            <button class="btn btn-primary" id="btn-capture">
                <span class="btn-icon">📸</span> Ler Etiqueta
            </button>
            <button class="btn" id="btn-simulate">
                <span class="btn-icon">📄</span> Simular
            </button>
        </div>

        <!-- CAMPOS -->
        <div class="field-group">
            <div class="field-row">
                <span class="field-label">🔖 PEP</span>
                <span class="field-value empty" id="pep-value">Aguardando...</span>
                <span class="badge">170-2500343-121</span>
            </div>
            <div class="field-row">
                <span class="field-label">📐 Diagrama</span>
                <span class="field-value empty" id="diagram-value">Aguardando...</span>
                <span class="badge">450890224</span>
            </div>
            <div class="field-row" style="border-bottom:none; padding-top:2px;">
                <span class="field-label" style="width:auto; font-size:0.75rem; color:#5e6f8d;">Última leitura</span>
                <span style="font-size:0.7rem; color:#5e6f8d;" id="last-scan">—</span>
            </div>
        </div>

        <!-- STATUS -->
        <div class="status-bar">
            <span class="flex">
                <span class="status-led" id="led-status"></span>
                <span id="status-text"><strong>Pronto</strong> · clique em "Ler"</span>
            </span>
            <span id="timer-badge" style="font-size:0.7rem;color:#5e6f8d;">OCR</span>
        </div>
        <div class="hint-text">
            <strong>Dica:</strong> O PEP aparece como <em>170-2500343-121</em> e o Diagrama como <em>450890224</em>.
        </div>
    </div>

    <script>
        (function() {
            // ----- ELEMENTOS -----
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const pepField = document.getElementById('pep-value');
            const diagramField = document.getElementById('diagram-value');
            const lastScanSpan = document.getElementById('last-scan');
            const statusText = document.getElementById('status-text');
            const ledStatus = document.getElementById('led-status');
            const timerBadge = document.getElementById('timer-badge');

            const btnCapture = document.getElementById('btn-capture');
            const btnSimulate = document.getElementById('btn-simulate');

            // ----- ESTADO -----
            let stream = null;
            let isProcessing = false;

            // ----- INICIALIZAR CÂMERA -----
            async function startCamera() {
                try {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                        stream = null;
                    }
                    const mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        }
                    });
                    stream = mediaStream;
                    video.srcObject = mediaStream;
                    await video.play();
                    setStatus('📷 Câmera ativa', 'active');
                } catch (err) {
                    console.error('Erro ao acessar câmera:', err);
                    setStatus('❌ Câmera indisponível', 'error');
                }
            }

            // ----- FUNÇÃO DE STATUS -----
            function setStatus(msg, state = 'idle') {
                statusText.innerHTML = msg;
                ledStatus.className = 'status-led';
                if (state === 'active') ledStatus.classList.add('active');
                else if (state === 'error') ledStatus.classList.add('error');
                // idle: sem classe extra
            }

            // ----- EXTRAÇÃO INTELIGENTE (PEP + DIAGRAMA) -----
            function extractFields(text) {
                // limpa quebras de linha e espaços excessivos
                let clean = text.replace(/\r/g, '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

                const result = { pep: null, diagram: null };

                // 1. PEP: padrão 170-2500343-121 (prioridade)
                //    Aceita hífen, travessão, en dash
                const pepRegex = /\b(170\s*[-–—]\s*2500343\s*[-–—]\s*121)\b/i;
                let pepMatch = clean.match(pepRegex);
                if (pepMatch) {
                    result.pep = pepMatch[1].replace(/\s/g, '').replace(/[–—]/g, '-');
                } else {
                    // fallback: qualquer 3-7-3 com hífen
                    const genericPep = clean.match(/\b(\d{3}\s*[-–—]\s*\d{7}\s*[-–—]\s*\d{3})\b/);
                    if (genericPep) {
                        result.pep = genericPep[1].replace(/\s/g, '').replace(/[–—]/g, '-');
                    } else {
                        // último recurso: 13 dígitos consecutivos
                        const digits13 = clean.match(/\b(\d{13})\b/);
                        if (digits13) {
                            const n = digits13[1];
                            result.pep = n.substring(0, 3) + '-' + n.substring(3, 10) + '-' + n.substring(10, 13);
                        }
                    }
                }

                // 2. DIAGRAMA: 450890224 (prioridade)
                //    Procuramos exatamente o número 450890224
                const diagramExact = clean.match(/\b450890224\b/);
                if (diagramExact) {
                    result.diagram = '450890224';
                } else {
                    // fallback: qualquer número de 9 dígitos (evitando pegar o pep)
                    const nineDigits = clean.match(/\b(\d{9})\b/g);
                    if (nineDigits) {
                        // escolhe o primeiro que não seja parte do PEP
                        for (let d of nineDigits) {
                            // se for igual ao pep (sem hífen) ou parecer com o padrão, ignoramos
                            const pepClean = result.pep ? result.pep.replace(/-/g, '') : '';
                            if (d !== pepClean && d !== '2500343' && !d.startsWith('170')) {
                                result.diagram = d;
                                break;
                            }
                        }
                        // se ainda não encontrou, pega o primeiro
                        if (!result.diagram && nineDigits.length > 0) {
                            result.diagram = nineDigits[0];
                        }
                    }
                }

                return result;
            }

            // ----- ATUALIZA UI COM OS CAMPOS -----
            function updateUI(pep, diagram, rawText) {
                // PEP
                if (pep) {
                    pepField.textContent = pep;
                    pepField.className = 'field-value populated';
                } else {
                    pepField.textContent = 'não encontrado';
                    pepField.className = 'field-value empty';
                }

                // Diagrama
                if (diagram) {
                    diagramField.textContent = diagram;
                    diagramField.className = 'field-value populated';
                } else {
                    diagramField.textContent = 'não encontrado';
                    diagramField.className = 'field-value empty';
                }

                // Última leitura (prévia)
                if (rawText && rawText.length > 0) {
                    const preview = rawText.length > 45 ? rawText.substring(0, 45) + '…' : rawText;
                    lastScanSpan.textContent = preview;
                } else {
                    lastScanSpan.textContent = '—';
                }
            }

            // ----- PROCESSAMENTO PRINCIPAL (CAPTURA + OCR) -----
            async function captureAndRead() {
                if (isProcessing) {
                    setStatus('⏳ Processando... aguarde', 'active');
                    return;
                }

                // Verifica se a câmera está pronta
                if (!video.videoWidth || !video.videoHeight) {
                    setStatus('⚠️ Aguarde a câmera iniciar', 'error');
                    return;
                }

                isProcessing = true;
                setStatus('📸 Capturando...', 'active');
                timerBadge.textContent = 'OCR ⏳';

                try {
                    // Desenha o frame no canvas
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    setStatus('🔍 Lendo OCR...', 'active');

                    // Executa OCR com Tesseract
                    const result = await Tesseract.recognize(canvas, 'por', {
                        logger: (m) => {
                            if (m.status === 'recognizing text') {
                                timerBadge.textContent = `OCR ${Math.round(m.progress * 100)}%`;
                            }
                        }
                    });

                    const texto = result.data.text;
                    console.log('📄 OCR completo:', texto);

                    // Extrai campos
                    const { pep, diagram } = extractFields(texto);
                    updateUI(pep, diagram, texto);

                    setStatus('✅ Leitura concluída!', 'active');
                    timerBadge.textContent = 'OK ✓';

                } catch (err) {
                    console.error('Erro no OCR:', err);
                    setStatus('❌ Erro na leitura', 'error');
                    timerBadge.textContent = 'Erro';
                } finally {
                    isProcessing = false;
                    // reset do timer após 3s
                    setTimeout(() => {
                        if (!isProcessing) timerBadge.textContent = 'OCR';
                    }, 3000);
                }
            }

            // ----- SIMULAÇÃO (etiqueta exemplo) -----
            function simulateLabel() {
                if (isProcessing) return;

                const mockData =
                    `SIPORTE SUST BMWI-C 55X30X27
        Lite: IB03
        Dep: 132302
        Fesp: Ord. Inviol. ID tag: 450890224
        Ord. Inviol. ID tag: 450890224
        Ord. Inviol. ID Tag: 450890224
        Ord. Inviol. ID Tag: 450890224
        PEP: 170 - 2500343 - 121
        Ord. Inviol. ID Tag: 450890224
        Ord. Inviol. ID Tag: 450890224
        Ord. Inviol. Tag: 450890224
        Ord. Inviol. Tag: 450890224
        1 / C: 28
        3,7658973 Wabie: 12936533`;

                const { pep, diagram } = extractFields(mockData);
                updateUI(pep, diagram, mockData);
                setStatus('📥 Simulação carregada', 'active');
                lastScanSpan.textContent = 'Simulação (exemplo)';
                timerBadge.textContent = 'SIM';
                setTimeout(() => { timerBadge.textContent = 'OCR'; }, 2500);
            }

            // ----- EVENTOS DOS BOTÕES -----
            btnCapture.addEventListener('click', captureAndRead);
            btnSimulate.addEventListener('click', simulateLabel);

            // ----- INICIALIZAÇÃO -----
            startCamera();

            // Estado inicial
            pepField.textContent = '—';
            diagramField.textContent = '—';
            pepField.className = 'field-value empty';
            diagramField.className = 'field-value empty';
            setStatus('📱 Câmera pronta', 'active');

            // Fallback: se a câmera demorar, avisa
            setTimeout(() => {
                if (!video.videoWidth) {
                    setStatus('⚠️ Toque em "Ler" após câmera iniciar', 'idle');
                }
            }, 4000);

            console.log('📋 Leitor WEG · PEP + Diagrama');
            console.log('🔹 PEP: 170-2500343-121');
            console.log('🔹 Diagrama: 450890224');
        })();
    </script>
</body>
</html>
